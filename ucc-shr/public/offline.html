<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Offline | CEGRAD UCC</title>
  <meta name="theme-color" content="#001F3F">
  <style>
    :root {
      color-scheme: light;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(160deg, #f4f8ff 0%, #ffffff 100%);
      color: #0b1a2b;
      padding: 24px;
    }

    .card {
      width: min(520px, 100%);
      background: #ffffff;
      border: 1px solid #d7e0ee;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0, 31, 63, 0.08);
    }

    h1 {
      margin: 0 0 12px;
      color: #001f3f;
      font-size: 1.5rem;
    }

    p {
      margin: 0 0 12px;
      line-height: 1.5;
    }

    .muted {
      color: #4a6078;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>You are offline</h1>
    <p>CEGRAD UCC could not reach the internet right now. Recently opened pages and saved app files may still work offline.</p>
    <p class="muted">Reconnect to sync reports, events, and live updates.</p>
  </main>
</body>
</html>
