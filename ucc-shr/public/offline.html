<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Offline | CEGRAD UCC</title>
  <meta name="theme-color" content="#001F3F">
  <style>
    :root {
      color-scheme: light;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: linear-gradient(135deg, #001F3F 0%, #003a6f 100%);
      color: #ffffff;
      padding: 24px;
    }

    .offline-container {
      text-align: center;
      max-width: 400px;
    }

    .logo {
      width: 100px;
      height: 100px;
      margin: 0 auto 32px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(10px);
      border: 2px solid rgba(255, 255, 255, 0.2);
    }

    .logo img {
      width: 70px;
      height: 70px;
      object-fit: contain;
    }

    h1 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 16px;
      letter-spacing: -0.5px;
    }

    p {
      font-size: 15px;
      line-height: 1.6;
      opacity: 0.85;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 13px;
      opacity: 0.7;
      margin-top: 16px;
    }

    @media (max-width: 480px) {
      body {
        padding: 16px;
      }

      h1 {
        font-size: 20px;
      }

      p {
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="offline-container">
    <div class="logo">
      <img src="/icons/logo.svg" alt="CEGRAD UCC Logo" />
    </div>
    <h1>You're Offline</h1>
    <p>Check your internet connection.</p>
  </div>
</body>
</html>
